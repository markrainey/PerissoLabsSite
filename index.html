<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        body {
            background-color: #0a192f;
            color: #e6f1ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
        }

        /* Logo: Now static after the initial fade-in */
        .logo-wrapper {
            display: block;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeInEntry 2s ease-out forwards;
        }

        .logo-wrapper img {
            max-width: 80%;
            height: auto;
            display: block; 
            margin: 0 auto;
            /* Animation removed from here to keep logo steady */
        }

        /* Text Wrapper: Handles the entry timing */
        .text-wrapper {
            opacity: 0;
            animation: fadeInEntry 2s ease-out 0.6s forwards;
        }

        /* The Pulsing Text */
        h1 {
            font-size: 3rem;
            letter-spacing: 0.3rem;
            text-transform: uppercase;
            margin: 0;
            font-weight: 300;
            color: #ffffff;
            /* Infinite breathing pulse applied ONLY here */
            animation: textPulse 3s ease-in-out infinite alternate;
        }

        /* Entry Animation (Slide + Fade) */
        @keyframes fadeInEntry {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Breathing Pulse for Text shadow and slight glow */
        @keyframes textPulse {
            0% {
                text-shadow: 0 0 8px rgba(100, 255, 218, 0.2);
                opacity: 0.8;
            }
            100% {
                text-shadow: 0 0 20px rgba(100, 255, 218, 0.7), 0 0 35px rgba(100, 255, 218, 0.3);
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            h1 { 
                font-size: 1.8rem; 
                letter-spacing: 0.15rem; 
            }
            .logo-wrapper img { 
                max-width: 70%; 
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-wrapper">
            <img src="PerissoLogoInverted.png" alt="Perisso Logo">
        </div>

        <div class="text-wrapper">
            <h1 class="coming-soon">Coming Soon</h1>
        </div>
    </div>

</body>
</html>
